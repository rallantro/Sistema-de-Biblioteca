<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca Juvia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lexend:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="title">
        <h1  style="color: #d1313d;">Sistema de livros da Academia Juvia</h1>
        <h2 style="color: #8eb2c5;">Bem-vindo ao Sistema da Biblioteca</h2>
        <a href="index.html"><button class="returnB">⬅</button></a>
    </div>

    <div class="searchForm">
        <form class="form" id="formSearch">
            <div class="pesquisa">
                <p><b>Pesquisar por:</b></p>
                <select class="dropdown" name="tipos" onchange="trocarSearch(this)" required>
                    <option value="" disabled selected>- escolha uma opção -</option>
                    <option value="Titulo">Título</option>
                    <option value="Autor">Autor</option>
                </select>
                <input class="barra" type="text" id="name" placeholder="Selecione uma opção de pesquisa">
                <button class="button" type="submit">🔍</button>
            </div>
            <div id="resultado" style="border-top: 5px solid #d1313d; display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px;"></div>
        </form>
    </div>
</body>
</html>
